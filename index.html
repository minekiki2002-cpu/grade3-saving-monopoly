<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>儲蓄與消費的選擇：生活理財大富翁</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --ink: #17324d;
      --paper: #fffaf0;
      --blue: #067ca3;
      --red: #e85b4f;
      --purple: #8379f2;
      --gold: #ffbe3b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(180deg, #fffaf0, #eaf8ff);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
    }
    button, input, textarea { font: inherit; }
    .app-shell { min-height: 100vh; }
    .soft-card {
      border: 3px solid rgba(23, 50, 77, .12);
      box-shadow: 0 12px 0 rgba(23, 50, 77, .08);
    }
    .game-board {
      position: relative;
      aspect-ratio: 16 / 9;
      min-height: 520px;
      overflow: hidden;
      border-radius: 28px;
      background-image: url("assets/board-bg.png");
      background-size: cover;
      background-position: center;
      border: 4px solid rgba(23, 50, 77, .12);
    }
    .tile {
      position: absolute;
      width: 9.2%;
      height: 13%;
      display: grid;
      place-items: center;
      padding: .35rem;
      border-radius: 16px;
      border: 2px solid rgba(23, 50, 77, .15);
      background: rgba(255, 255, 255, .76);
      backdrop-filter: blur(2px);
      transition: transform .22s ease, box-shadow .22s ease;
      text-align: center;
    }
    .tile.active {
      transform: translateY(-8px) scale(1.04);
      box-shadow: 0 10px 0 rgba(23, 50, 77, .2);
      outline: 4px solid rgba(255, 190, 59, .95);
      z-index: 5;
    }
    .tile-title { font-size: clamp(10px, 1vw, 16px); font-weight: 1000; line-height: 1.05; }
    .tile-sub { font-size: clamp(9px, .8vw, 12px); font-weight: 800; color: #416176; line-height: 1.1; }
    .animal {
      width: 34px;
      height: 34px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      background: white;
      border: 2px solid currentColor;
      box-shadow: 0 3px 0 rgba(23, 50, 77, .2);
      font-size: 22px;
    }
    .animal.small { width: 26px; height: 26px; font-size: 17px; }
    .tokens { position: absolute; left: 50%; top: 58%; transform: translateX(-50%); display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; width: 92%; }
    .mission {
      position: absolute;
      left: 24%;
      top: 34%;
      width: 38%;
      min-height: 24%;
      display: grid;
      align-content: center;
      border-radius: 24px;
      background: rgba(255,255,255,.78);
      border: 3px dashed rgba(6, 124, 163, .45);
      padding: 1rem;
      text-align: center;
    }
    .card-zone {
      position: absolute;
      right: 4%;
      width: 18%;
      height: 20%;
      perspective: 900px;
      cursor: pointer;
    }
    .card-zone.chance { top: 35%; }
    .card-zone.fate { top: 61%; }
    .stack-card {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      border-radius: 18px;
      color: white;
      font-weight: 1000;
      font-size: clamp(20px, 3vw, 42px);
      border: 3px solid rgba(255,255,255,.55);
      box-shadow: 0 9px 0 rgba(23, 50, 77, .24);
    }
    .stack-card:nth-child(1) { transform: translate(10px, 10px) rotate(2deg); opacity: .75; }
    .stack-card:nth-child(2) { transform: translate(5px, 5px) rotate(-1deg); opacity: .9; }
    .stack-card:nth-child(3) { transform: translate(0, 0); }
    .card-zone.drawing .stack-card:nth-child(3) { animation: drawCard .72s ease both; }
    @keyframes drawCard {
      0% { transform: translate(0,0) rotateY(0deg) scale(1); }
      55% { transform: translate(-180px,-70px) rotateY(95deg) scale(1.05); }
      100% { transform: translate(-210px,-30px) rotateY(180deg) scale(1.08); }
    }
    .dice-wrap { perspective: 800px; }
    .dice3d {
      position: relative;
      width: 72px;
      height: 72px;
      transform-style: preserve-3d;
      transform: rotateX(-20deg) rotateY(25deg);
      transition: transform .35s ease;
    }
    .dice3d.rolling { animation: diceJump 1s cubic-bezier(.2,.9,.25,1.2); }
    @keyframes diceJump {
      0% { transform: translateY(0) rotateX(0) rotateY(0) rotateZ(0); }
      35% { transform: translateY(-60px) rotateX(260deg) rotateY(210deg) rotateZ(70deg); }
      70% { transform: translateY(8px) rotateX(540deg) rotateY(470deg) rotateZ(140deg); }
      100% { transform: translateY(0) rotateX(700deg) rotateY(610deg) rotateZ(180deg); }
    }
    .face {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      padding: 10px;
      background: linear-gradient(145deg, #fff, #e7f2ff);
      border: 3px solid #17324d;
      border-radius: 16px;
      box-shadow: inset -4px -4px 0 rgba(23,50,77,.08);
    }
    .f1 { transform: rotateY(0deg) translateZ(36px); }
    .f2 { transform: rotateY(90deg) translateZ(36px); }
    .f3 { transform: rotateX(90deg) translateZ(36px); }
    .f4 { transform: rotateX(-90deg) translateZ(36px); }
    .f5 { transform: rotateY(-90deg) translateZ(36px); }
    .f6 { transform: rotateY(180deg) translateZ(36px); }
    .pip {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      align-self: center;
      justify-self: center;
      background: #17324d;
      opacity: 0;
    }
    .pip.on { opacity: 1; }
    .progress-track {
      position: relative;
      height: 16px;
      border-radius: 999px;
      background: linear-gradient(90deg, #f87171 0%, #fee2e2 48%, #d1fae5 52%, #22c55e 100%);
      overflow: hidden;
      border: 1px solid rgba(23,50,77,.15);
    }
    .zero-line {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(23,50,77,.65);
    }
    .progress-dot {
      position: absolute;
      top: 50%;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      border: 3px solid white;
      box-shadow: 0 2px 0 rgba(23,50,77,.25);
    }
    .modal-backdrop { background: rgba(10, 24, 38, .55); }
    .flip-in { animation: flipIn .45s ease both; transform-style: preserve-3d; }
    @keyframes flipIn {
      from { transform: rotateY(90deg) scale(.92); opacity: .4; }
      to { transform: rotateY(0) scale(1); opacity: 1; }
    }
    @media (max-width: 1100px) {
      .game-board { min-height: auto; }
      .tile { border-radius: 12px; padding: .2rem; }
      .mission { left: 19%; top: 34%; width: 46%; padding: .55rem; }
      .card-zone { width: 20%; right: 3%; }
    }
    @media (max-width: 760px) {
      .game-board { aspect-ratio: 10 / 14; background-size: cover; background-position: center; min-height: 720px; }
      .tile { width: 18%; height: 8%; }
      .mission { left: 12%; top: 36%; width: 55%; min-height: 20%; }
      .card-zone { right: 3%; width: 28%; height: 12%; }
      .card-zone.chance { top: 39%; }
      .card-zone.fate { top: 54%; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <audio id="bgm" src="assets/flowerbed_fields.ogg" loop preload="auto"></audio>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const animals = ["🐶", "🐱", "🐰", "🐻", "🦊", "🐼"];
    const colors = ["#e85b4f", "#067ca3", "#2fbf71", "#f59e0b", "#8379f2", "#ec4899"];
    const names = ["柴柴", "橘貓", "兔兔", "熊熊", "狐狸", "貓熊"];
    const goals = [
      ["一套故事書", 500, 25],
      ["烏克麗麗", 1200, 40],
      ["運動鞋", 900, 30],
      ["桌遊", 650, 25],
      ["耳機", 800, 30],
      ["小型電腦基金", 3000, 60],
    ];

    const coordsWide = [
      [3, 5], [16, 5], [29, 5], [42, 5], [55, 5], [68, 5],
      [68, 20], [68, 35], [68, 50], [55, 77], [42, 77], [29, 77],
      [16, 77], [3, 77], [3, 62], [3, 47], [3, 32], [16, 32],
      [29, 32], [42, 32], [55, 32], [55, 62], [42, 62], [29, 62],
    ];

    const coordsMobile = [
      [4, 3], [28, 3], [52, 3], [76, 3], [76, 13], [76, 23],
      [76, 33], [76, 43], [76, 53], [76, 63], [76, 73], [52, 85],
      [28, 85], [4, 85], [4, 75], [4, 65], [4, 55], [4, 45],
      [4, 35], [28, 25], [52, 25], [52, 63], [28, 63], [28, 45],
    ];

    const tiles = [
      { type: "start", title: "GO", sub: "領零用錢", effect: 100 },
      { type: "work", title: "整理書包", sub: "+30", effect: 30 },
      { type: "chance", title: "機會", sub: "抽牌" },
      { type: "need", title: "早餐", sub: "-45", effect: -45 },
      { type: "work", title: "回收高手", sub: "+40", effect: 40 },
      { type: "fate", title: "命運", sub: "抽牌" },
      { type: "want", title: "遊戲點數", sub: "想買", effect: -120 },
      { type: "work", title: "閱讀分享", sub: "+60", effect: 60 },
      { type: "need", title: "鞋子壞了", sub: "-220", effect: -220 },
      { type: "chance", title: "機會", sub: "抽牌" },
      { type: "rest", title: "想一想", sub: "判斷題" },
      { type: "work", title: "家事小幫手", sub: "+50", effect: 50 },
      { type: "start", title: "一圈", sub: "先存錢", effect: 100 },
      { type: "fate", title: "命運", sub: "抽牌" },
      { type: "want", title: "新玩具", sub: "心動", effect: -180 },
      { type: "work", title: "準時作業", sub: "+45", effect: 45 },
      { type: "need", title: "看醫生", sub: "-260", effect: -260 },
      { type: "chance", title: "機會", sub: "抽牌" },
      { type: "work", title: "惜物修理", sub: "+80", effect: 80 },
      { type: "need", title: "水電分擔", sub: "-160", effect: -160 },
      { type: "fate", title: "命運", sub: "抽牌" },
      { type: "want", title: "飲料點心", sub: "好想喝", effect: -70 },
      { type: "work", title: "小組合作", sub: "+90", effect: 90 },
      { type: "eco", title: "環保杯", sub: "+25", effect: 25 },
    ];

    const chanceCards = [
      {
        title: "遊戲儲值跳出限時禮包",
        text: "畫面一直閃：「只剩 10 分鐘！」你心裡怎麼想？",
        options: [
          { label: "當然要先問問自己：少了它生活會怎樣呀！", effect: 30, kind: "收入", note: "抵抗誘惑，儲蓄計畫更穩。" },
          { label: "當然要買限定造型呀！", effect: -180, kind: "支出", note: "這是想要型消費，記得看它讓目標慢了幾天。" },
        ],
      },
      {
        title: "同學想跟你借錢",
        text: "同學忘了帶錢買午餐，想借你 80 元，明天還。",
        options: [
          { label: "當然要先確認是吃飯需要，再借呀！", effect: -80, kind: "支出", note: "有同理心，也要記錄借出的錢。" },
          { label: "當然要全部借出去，朋友最重要呀！", effect: -180, kind: "支出", note: "幫人很好，但也要量力而為，不能讓自己陷入困難。" },
        ],
      },
      {
        title: "發票對獎",
        text: "你把統一發票收好，今天對獎發現中了小獎。",
        options: [
          { label: "當然要把獎金存起來呀！", effect: 200, kind: "收入", note: "保存發票也能保障權益，還可能有小驚喜。" },
          { label: "當然要請大家喝飲料呀！", effect: -120, kind: "支出", note: "分享很溫暖，但可以先想預算和目標。" },
        ],
      },
      {
        title: "商品標示小偵探",
        text: "超便宜餅乾快到期了，包裝還有一點破。",
        options: [
          { label: "當然要看保存期限和包裝呀！", effect: 60, kind: "收入", note: "你做了消費前評估，避免浪費與風險。" },
          { label: "當然要買，便宜最讚呀！", effect: -90, kind: "支出", note: "便宜不等於適合，要看品質、標示與需要。" },
        ],
      },
    ];

    const fateCards = [
      { title: "看醫生與買藥", text: "感冒了，需要看醫生與買藥。", effect: -280, kind: "支出", note: "健康是需要，緊急預備金很重要。" },
      { title: "摔壞同學的水壺", text: "跑太快不小心撞倒同學水壺，必須賠償。", effect: -250, kind: "支出", note: "生活中會有意外支出，也要學會負責任。" },
      { title: "家裡水電費增加", text: "天氣熱，家中電費變高，這週分擔一點。", effect: -220, kind: "支出", note: "固定支出要放進計畫，節能也能省錢。" },
      { title: "紅包存一半", text: "長輩給紅包，你決定先存一半。", effect: 500, kind: "收入", note: "先存再花，是達成目標的好策略。" },
      { title: "天災愛心捐款", text: "學校發起小額捐款，幫助受災家庭。", effect: -100, kind: "支出", note: "在能力範圍內助人，是有意義的金錢運用。" },
      { title: "幫鄰居整理回收", text: "你用下課後時間幫忙分類回收。", effect: 120, kind: "收入", note: "收入可以來自努力，也能結合環保行動。" },
    ];

    const quickQuestions = [
      { q: "鞋子破到會進水，買新鞋比較像？", answer: "需要", reward: 50, why: "少了會影響健康與生活。" },
      { q: "同款貼紙已經有很多，看到新款又想買，這比較像？", answer: "想要", reward: 50, why: "它滿足喜好，但不是生活必需。" },
      { q: "同樣是書包，該比較價格、品質和能不能負擔，這叫做？", answer: "評估", reward: 50, why: "需要也要做消費前評估。" },
    ];

    function makePlayers() {
      return goals.map((g, i) => ({
        id: i,
        name: names[i],
        animal: animals[i],
        color: colors[i],
        goal: g[0],
        target: g[1],
        daily: g[2],
        balance: 300,
        position: 0,
        active: true,
        dayLog: [],
        allLog: [],
      }));
    }
    function money(n) { return `${n < 0 ? "-" : ""}$${Math.abs(n)}`; }
    function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }

    function Dice({ value, rolling }) {
      const pips = {
        1: [4], 2: [0, 8], 3: [0, 4, 8], 4: [0, 2, 6, 8], 5: [0, 2, 4, 6, 8], 6: [0, 2, 3, 5, 6, 8],
      };
      return <div className="dice-wrap">
        <div className={`dice3d ${rolling ? "rolling" : ""}`} aria-label={`骰子 ${value} 點`}>
          {[1,2,3,4,5,6].map(n => <div key={n} className={`face f${n}`}>
            {Array.from({length: 9}).map((_, i) => <span key={i} className={`pip ${pips[n].includes(i) ? "on" : ""}`}></span>)}
          </div>)}
        </div>
      </div>;
    }

    function App() {
      const [players, setPlayers] = useState(makePlayers);
      const [current, setCurrent] = useState(0);
      const [day, setDay] = useState(1);
      const [turnsThisDay, setTurnsThisDay] = useState(0);
      const [dice, setDice] = useState(1);
      const [rolling, setRolling] = useState(false);
      const [message, setMessage] = useState("請先看右側儲蓄計畫，再按下骰子開始第一天。");
      const [modal, setModal] = useState(null);
      const [drawing, setDrawing] = useState(null);
      const [musicOn, setMusicOn] = useState(false);
      const [isMobile, setIsMobile] = useState(false);
      const audioReady = useRef(false);

      useEffect(() => {
        const onResize = () => setIsMobile(window.innerWidth < 760);
        onResize();
        window.addEventListener("resize", onResize);
        return () => window.removeEventListener("resize", onResize);
      }, []);

      const activePlayers = players.filter(p => p.active);
      const player = players[current];
      const coords = isMobile ? coordsMobile : coordsWide;

      function unlockAudio() {
        if (audioReady.current) return;
        audioReady.current = true;
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        window.gameAudio = new AudioContext();
      }
      function beep(freq = 440, dur = .12, type = "sine", gain = .05) {
        try {
          unlockAudio();
          const ctx = window.gameAudio;
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.type = type;
          osc.frequency.value = freq;
          g.gain.setValueAtTime(gain, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + dur);
          osc.connect(g).connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + dur);
        } catch (e) {}
      }
      function rollSound() {
        [180, 260, 340, 460].forEach((f, i) => setTimeout(() => beep(f, .08, "square", .035), i * 90));
      }
      function cardSound() {
        [520, 660, 780].forEach((f, i) => setTimeout(() => beep(f, .08, "triangle", .04), i * 75));
      }
      function settleSound() {
        [392, 523, 659].forEach((f, i) => setTimeout(() => beep(f, .16, "sine", .05), i * 120));
      }
      async function toggleMusic() {
        const bgm = document.getElementById("bgm");
        if (!musicOn) {
          try { await bgm.play(); setMusicOn(true); } catch (e) { setMessage("請再按一次音樂開關，瀏覽器需要先由老師點擊啟動音樂。"); }
        } else {
          bgm.pause();
          setMusicOn(false);
        }
      }
      function addEvent(id, event) {
        setPlayers(list => list.map(p => {
          if (p.id !== id) return p;
          const next = p.balance + event.effect;
          const item = { ...event, after: next };
          return { ...p, balance: next, dayLog: [...p.dayLog, item], allLog: [item, ...p.allLog].slice(0, 8) };
        }));
      }
      function nextActiveIndex(from) {
        for (let step = 1; step <= players.length; step++) {
          const idx = (from + step) % players.length;
          if (players[idx].active) return idx;
        }
        return from;
      }
      function finishTurn() {
        const nextTurns = turnsThisDay + 1;
        const stillActive = players.filter(p => p.active).length;
        if (nextTurns >= stillActive && stillActive > 0) {
          setTurnsThisDay(nextTurns);
          setTimeout(() => openSettlement(), 120);
        } else {
          setTurnsThisDay(nextTurns);
          setCurrent(nextActiveIndex(current));
        }
      }
      function openSettlement() {
        settleSound();
        setModal({ type: "settle", snapshot: players.map(p => ({ ...p })) });
      }
      function continueNextDay() {
        setPlayers(list => list.map(p => ({
          ...p,
          active: p.active && p.balance >= 0,
          dayLog: [],
        })));
        const next = players.findIndex(p => p.active && p.balance >= 0);
        setCurrent(next >= 0 ? next : 0);
        setTurnsThisDay(0);
        setDay(d => d + 1);
        setModal(null);
        setMessage("新的一天開始了。請繼續擲骰，看看儲蓄計畫能不能撐住生活考驗。");
      }
      function draw(kind, forced = false) {
        if (!forced && modal) return;
        setDrawing(kind);
        cardSound();
        const deck = kind === "chance" ? chanceCards : fateCards;
        const card = deck[Math.floor(Math.random() * deck.length)];
        setTimeout(() => {
          setDrawing(null);
          if (card.options) setModal({ type: "choice", kind, card });
          else setModal({ type: "event", kind, card });
        }, 650);
      }
      function applyCard(option) {
        addEvent(player.id, { title: modal.card.title, effect: option.effect, kind: option.kind || modal.card.kind, note: option.note || modal.card.note });
        setMessage(`${player.name}：${option.note || modal.card.note}（${money(option.effect)}）`);
        setModal(null);
        finishTurn();
      }
      function answerQuestion(ans) {
        const q = modal.question;
        if (ans === q.answer) {
          addEvent(player.id, { title: "需要想要判斷成功", effect: q.reward, kind: "收入", note: q.why });
          setMessage(`答對了！${q.why} 小組得到 ${money(q.reward)}。`);
        } else {
          addEvent(player.id, { title: "需要想要再想想", effect: 0, kind: "反思", note: q.why });
          setMessage(`先沒關係，我們一起修正：${q.why}`);
        }
        setModal(null);
        finishTurn();
      }
      function handleTile(tile, passedStart) {
        if (passedStart || tile.type === "start") {
          addEvent(player.id, { title: "經過起點領零用錢", effect: 100, kind: "收入", note: "一日收入入帳。" });
          addEvent(player.id, { title: "依計畫先存錢", effect: player.daily, kind: "收入", note: `今天努力往「${player.goal}」前進。` });
        }
        if (tile.type === "chance") return draw("chance", true);
        if (tile.type === "fate") return draw("fate", true);
        if (tile.type === "rest") {
          const q = quickQuestions[Math.floor(Math.random() * quickQuestions.length)];
          setModal({ type: "question", question: q });
          return;
        }
        if (tile.type === "want") {
          setModal({
            type: "choice",
            kind: "want",
            card: {
              title: tile.title,
              text: `你心裡冒出一個小聲音：「真的好想要喔！」要怎麼做？`,
              options: [
                { label: "當然要先看我的存錢目標呀！", effect: 30, kind: "收入", note: "你把目標放在心上，少花一次就是多存一次。" },
                { label: `當然要買${tile.title}呀！`, effect: tile.effect, kind: "支出", note: "滿足喜歡的感覺，也要記錄它讓儲蓄慢下來。" },
              ],
            },
          });
          return;
        }
        const kind = tile.effect >= 0 ? "收入" : "支出";
        const note = tile.type === "need" ? "生活中的需要支出。" : tile.type === "eco" ? "環保行動讓花費變少。" : tile.type === "work" ? "努力完成日常工作得到收入。" : tile.sub;
        addEvent(player.id, { title: tile.title, effect: tile.effect, kind, note });
        setMessage(`${player.name} 來到「${tile.title}」，${kind} ${money(tile.effect)}。`);
        finishTurn();
      }
      function roll() {
        if (modal || rolling || !player.active) return;
        unlockAudio();
        rollSound();
        setRolling(true);
        const value = Math.ceil(Math.random() * 6);
        setTimeout(() => {
          setDice(value);
          setPlayers(list => list.map(p => {
            if (p.id !== player.id) return p;
            return { ...p, position: (p.position + value) % tiles.length };
          }));
          const nextPos = (player.position + value) % tiles.length;
          const passed = player.position + value >= tiles.length;
          setMessage(`${player.name} 擲出 ${value} 點，走到「${tiles[nextPos].title}」。`);
          setRolling(false);
          setTimeout(() => handleTile(tiles[nextPos], passed), 180);
        }, 980);
      }
      function resetGame() {
        setPlayers(makePlayers());
        setCurrent(0);
        setDay(1);
        setTurnsThisDay(0);
        setDice(1);
        setMessage("請先看右側儲蓄計畫，再按下骰子開始第一天。");
        setModal(null);
      }
      const allOut = players.every(p => !p.active || p.balance < 0);

      return <main className="app-shell px-3 py-4 sm:px-5">
        <section className="mx-auto max-w-[1800px]">
          <header className="soft-card mb-4 rounded-[28px] bg-white/90 p-4 md:p-5">
            <div className="flex flex-col gap-3 lg:flex-row lg:items-end lg:justify-between">
              <div>
                <p className="inline-flex rounded-full bg-amber-100 px-4 py-2 text-sm font-black text-amber-900">PBL 專題：我的儲蓄計畫能撐過真實生活嗎？</p>
                <h1 className="mt-3 text-3xl font-black leading-tight md:text-5xl">儲蓄與消費的選擇：生活理財大富翁</h1>
                <p className="mt-2 font-bold text-slate-600">設計者：新北市網溪國小 Kiki 老師設計</p>
              </div>
              <div className="flex flex-wrap gap-2">
                <button onClick={toggleMusic} className="rounded-2xl bg-[#067ca3] px-4 py-3 font-black text-white shadow-[0_5px_0_rgba(23,50,77,.22)]">{musicOn ? "關閉音樂" : "播放音樂"}</button>
                <button onClick={resetGame} className="rounded-2xl bg-slate-800 px-4 py-3 font-black text-white shadow-[0_5px_0_rgba(23,50,77,.22)]">重新開始</button>
              </div>
            </div>
          </header>

          <section className="grid gap-4 xl:grid-cols-[1fr_500px]">
            <div className="soft-card rounded-[30px] bg-white p-3">
              <div className="game-board">
                {tiles.map((t, i) => {
                  const [x, y] = coords[i];
                  const here = players.filter(p => p.position === i && p.active);
                  return <div key={i} className={`tile ${player.position === i ? "active" : ""}`} style={{ left: `${x}%`, top: `${y}%` }}>
                    <div>
                      <div className="tile-title">{t.title}</div>
                      <div className="tile-sub">{t.sub}</div>
                    </div>
                    <div className="tokens">{here.map(p => <span key={p.id} className="animal small" style={{ color: p.color }}>{p.animal}</span>)}</div>
                  </div>;
                })}
                <div className="mission">
                  <h2 className="text-xl font-black md:text-3xl">第 {day} 天任務</h2>
                  <p className="mt-2 text-sm font-bold leading-6 md:text-base">{message}</p>
                  <p className="mt-3 text-xs font-black text-slate-500 md:text-sm">輪到：<span style={{ color: player.color }}>{player.animal} {player.name}</span> ｜ 已行動 {turnsThisDay}/{activePlayers.length}</p>
                </div>
                <button onClick={() => draw("chance")} className={`card-zone chance ${drawing === "chance" ? "drawing" : ""}`} aria-label="抽機會卡">
                  <div className="stack-card bg-[#e85b4f]">機會</div><div className="stack-card bg-[#e85b4f]">機會</div><div className="stack-card bg-[#e85b4f]">機會</div>
                </button>
                <button onClick={() => draw("fate")} className={`card-zone fate ${drawing === "fate" ? "drawing" : ""}`} aria-label="抽命運卡">
                  <div className="stack-card bg-[#8379f2]">命運</div><div className="stack-card bg-[#8379f2]">命運</div><div className="stack-card bg-[#8379f2]">命運</div>
                </button>
              </div>
            </div>

            <aside className="grid gap-4">
              <div className="soft-card rounded-[28px] bg-white p-4">
                <div className="flex items-center justify-between gap-3">
                  <div>
                    <h2 className="text-2xl font-black">擲骰區</h2>
                    <p className="text-sm font-bold text-slate-500">立體骰子會跳起來轉動</p>
                  </div>
                  <Dice value={dice} rolling={rolling} />
                </div>
                <button disabled={!!modal || rolling || allOut} onClick={roll} className="mt-4 w-full rounded-2xl bg-[#e85b4f] px-5 py-4 text-xl font-black text-white shadow-[0_8px_0_rgba(23,50,77,.22)] disabled:bg-slate-300">擲骰子</button>
              </div>

              <div className="soft-card rounded-[28px] bg-white p-4">
                <h2 className="text-2xl font-black">六位玩家儲蓄計畫</h2>
                <div className="mt-3 grid grid-cols-1 gap-3 sm:grid-cols-2 xl:grid-cols-3">
                  {players.map(p => {
                    const pos = clamp(((p.balance + 10000) / 20000) * 100, 0, 100);
                    return <div key={p.id} className={`rounded-2xl border-2 p-3 ${p.id === current ? "border-amber-400 bg-amber-50" : "border-slate-100 bg-slate-50"} ${(!p.active || p.balance < 0) ? "opacity-55 grayscale" : ""}`}>
                      <div className="flex items-center justify-between">
                        <span className="animal" style={{ color: p.color }}>{p.animal}</span>
                        <b className="text-sm">{(!p.active || p.balance < 0) ? "出局" : money(p.balance)}</b>
                      </div>
                      <input value={p.name} onChange={e => setPlayers(list => list.map(x => x.id === p.id ? {...x, name: e.target.value} : x))} className="mt-2 w-full rounded-xl border border-slate-200 bg-white px-2 py-1 font-black" />
                      <input value={p.goal} onChange={e => setPlayers(list => list.map(x => x.id === p.id ? {...x, goal: e.target.value} : x))} className="mt-2 w-full rounded-xl border border-slate-200 bg-white px-2 py-1 text-sm" />
                      <div className="mt-2 grid grid-cols-2 gap-2 text-xs font-bold">
                        <label>目標<input type="number" value={p.target} onChange={e => setPlayers(list => list.map(x => x.id === p.id ? {...x, target: Number(e.target.value)} : x))} className="mt-1 w-full rounded-lg border px-2 py-1" /></label>
                        <label>每日存<input type="number" value={p.daily} onChange={e => setPlayers(list => list.map(x => x.id === p.id ? {...x, daily: Number(e.target.value)} : x))} className="mt-1 w-full rounded-lg border px-2 py-1" /></label>
                      </div>
                      <div className="mt-3 flex justify-between text-[10px] font-black text-slate-500"><span>-10000</span><span>0</span><span>10000</span></div>
                      <div className="progress-track"><span className="zero-line"></span><span className="progress-dot" style={{ left: `${pos}%`, background: p.color }}></span></div>
                    </div>;
                  })}
                </div>
              </div>

              <div className="soft-card rounded-[28px] bg-white p-4">
                <h2 className="text-xl font-black">反思筆記</h2>
                <textarea className="mt-2 min-h-24 w-full rounded-2xl border-2 border-slate-200 p-3 text-sm leading-6" placeholder="今天我發現：想要很容易說服自己，但是需要、目標和緊急金也要放進計畫......"></textarea>
              </div>
            </aside>
          </section>

          <footer className="mt-4 rounded-[28px] bg-[#17324d] p-5 text-white">
            <h2 className="text-xl font-black">教師關懷／療癒語錄</h2>
            <p className="mt-2 leading-7">親愛的老師，孩子不是一次就會成熟選擇；他們是在一次次被溫柔接住後，慢慢學會為自己負責。你今天陪他們想清楚一個生活決定，就已經很有力量。</p>
            <p className="mt-3 text-xs text-slate-200">音樂來源：OpenGameArt「Flowerbed Fields [Loop]」，Zane Little Music，CC0。底圖使用 Image 2.0 生成後置入本教具。</p>
          </footer>
        </section>

        {modal && <div className="modal-backdrop fixed inset-0 z-50 grid place-items-center p-4">
          <div className="flip-in max-h-[92vh] w-full max-w-3xl overflow-auto rounded-[30px] bg-white p-5 shadow-2xl">
            {modal.type === "choice" && <>
              <span className={`inline-flex rounded-full px-4 py-1 text-sm font-black text-white ${modal.kind === "chance" ? "bg-[#e85b4f]" : "bg-[#8379f2]"}`}>{modal.kind === "chance" ? "機會卡" : "選擇題"}</span>
              <h2 className="mt-3 text-3xl font-black">{modal.card.title}</h2>
              <p className="mt-3 text-lg leading-8 text-slate-700">{modal.card.text}</p>
              <div className="mt-5 grid gap-3">
                {modal.card.options.map((op, i) => <button key={i} onClick={() => applyCard(op)} className="rounded-2xl border-2 border-slate-200 bg-slate-50 p-4 text-left font-black hover:border-amber-400 hover:bg-amber-50">
                  {op.label}<span className="ml-2 text-sm text-slate-500">({money(op.effect)})</span>
                </button>)}
              </div>
            </>}
            {modal.type === "event" && <>
              <span className="inline-flex rounded-full bg-[#8379f2] px-4 py-1 text-sm font-black text-white">命運卡</span>
              <h2 className="mt-3 text-3xl font-black">{modal.card.title}</h2>
              <p className="mt-3 text-lg leading-8 text-slate-700">{modal.card.text}</p>
              <p className="mt-3 rounded-2xl bg-violet-50 p-4 font-bold">{modal.card.note}</p>
              <button onClick={() => applyCard(modal.card)} className="mt-5 w-full rounded-2xl bg-[#8379f2] px-4 py-4 text-xl font-black text-white">記錄這件事 {money(modal.card.effect)}</button>
            </>}
            {modal.type === "question" && <>
              <span className="inline-flex rounded-full bg-[#067ca3] px-4 py-1 text-sm font-black text-white">需要 / 想要 / 評估</span>
              <h2 className="mt-3 text-3xl font-black leading-tight">{modal.question.q}</h2>
              <div className="mt-5 grid grid-cols-3 gap-3">
                {["需要", "想要", "評估"].map(ans => <button key={ans} onClick={() => answerQuestion(ans)} className="rounded-2xl bg-[#067ca3] px-3 py-5 text-xl font-black text-white">{ans}</button>)}
              </div>
            </>}
            {modal.type === "settle" && <>
              <span className="inline-flex rounded-full bg-amber-500 px-4 py-1 text-sm font-black text-white">一天過去</span>
              <h2 className="mt-3 text-3xl font-black">第 {day} 天結算</h2>
              <p className="mt-2 font-bold text-slate-600">玩家 1～6 今天做了哪些事？看看收入、支出和已存金額。</p>
              <div className="mt-4 grid gap-3">
                {modal.snapshot.map(p => {
                  const income = p.dayLog.filter(x => x.effect > 0).reduce((s, x) => s + x.effect, 0);
                  const expense = Math.abs(p.dayLog.filter(x => x.effect < 0).reduce((s, x) => s + x.effect, 0));
                  const out = p.balance < 0;
                  return <div key={p.id} className={`rounded-2xl border-2 p-3 ${out ? "border-red-200 bg-red-50" : "border-slate-100 bg-slate-50"}`}>
                    <div className="flex flex-wrap items-center justify-between gap-2">
                      <b className="text-lg"><span className="mr-2">{p.animal}</span>{p.name}</b>
                      <span className={`rounded-full px-3 py-1 text-sm font-black ${out ? "bg-red-600 text-white" : "bg-emerald-100 text-emerald-900"}`}>{out ? "負債，淘汰出局" : `已存 ${money(p.balance)}`}</span>
                    </div>
                    <div className="mt-2 text-sm font-bold text-slate-600">收入 {money(income)} ｜ 支出 {money(expense)} ｜ 目標：{p.goal}</div>
                    <ul className="mt-2 space-y-1 text-sm leading-6">
                      {p.dayLog.length ? p.dayLog.map((e, i) => <li key={i}>• {e.title}：{money(e.effect)}，{e.note}</li>) : <li>• 今天沒有記錄到事件。</li>}
                    </ul>
                  </div>;
                })}
              </div>
              <button onClick={continueNextDay} className="mt-5 w-full rounded-2xl bg-[#17324d] px-4 py-4 text-xl font-black text-white">開始下一天</button>
            </>}
          </div>
        </div>}
      </main>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
