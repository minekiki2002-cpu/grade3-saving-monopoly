    .tile {
      position: absolute;
      width: 9%;
      height: 13.5%;
      display: grid;
      place-items: center;
      padding: .25rem;
      border-radius: 14px;
      border: 2px solid rgba(23, 50, 77, .10);
      background: rgba(255, 255, 255, .55);
      backdrop-filter: blur(2px);
      transition: transform .22s ease, box-shadow .22s ease;

      transform: translateY(-8px) scale(1.04);

      height: 34px;

      0% { transform: translateY(0) scale(1); }
      45% { transform: translateY(-18px) scale(1.18); }
      100% { transform: translateY(0) scale(1); }

    .tokens {
      position: absolute; left: 50%; top: 58%;
      transform: translate(-50%, -50%);
      display: flex; gap: 1px;
      flex-wrap: wrap; justify-content: center;
      width: 96%;
    }
    .token-wrap {
      display: inline-block;
      transition: transform .3s ease;
      line-height: 0;
    }
    .token-wrap.moving {
      animation: hopToken .5s ease;
      z-index: 30;
    }
    /* When 4+ tokens crowd a tile, overlap inward */
    .tokens:has(.token-wrap:nth-child(4)) .token-wrap {
      margin-left: -10px;
    }
    .tokens:has(.token-wrap:nth-child(4)) .token-wrap:first-child {
      margin-left: 0;

    .mission {
      position: absolute;
      left: 31%;
      top: 39%;
      width: 30%;
      min-height: 16%;
      display: grid;
      align-content: center;
      border-radius: 18px;
      background: rgba(255,255,255,.86);

      background: transparent;
      border: 0;
      padding: 0;

    .card-zone.fate { top: 44.7%; height: 27.5%; }
    .stack-card {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      border-radius: 18px;
      color: white;
      font-weight: 1000;
      font-size: clamp(20px, 3vw, 42px);
      border: 3px solid rgba(255,255,255,.55);
      box-shadow: 0 9px 0 rgba(23, 50, 77, .24);
      overflow: hidden;
    }
    .stack-card::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 12px;
      opacity: .28;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.85) 0 6px, transparent 7px),

    .stack-card .label {
      position: relative;
      z-index: 1;

    .card-zone.drawing .stack-card:nth-child(3) { animation: drawCard .72s ease both; }

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot,
      runTransaction, serverTimestamp, deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBZ666oMN5NeEG6jicsHG2OJPkZSBnLu2w",
      authDomain: "grade3-saving-monopoly.firebaseapp.com",
      projectId: "grade3-saving-monopoly",
      storageBucket: "grade3-saving-monopoly.firebasestorage.app",
      messagingSenderId: "595491190598",
      appId: "1:595491190598:web:21684baff1f25fb5b49747"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Stable per-browser identity
    function getUserId() {
      let id = localStorage.getItem("monopoly:userId");
      if (!id) {
        id = "u_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);
        localStorage.setItem("monopoly:userId", id);
      }
      return id;
    }
    const userId = getUserId();
    const sanitizeCode = c => (c || "").toString().toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 6);
    function randCode() {
      // Avoid ambiguous chars 0/O/1/I
      const letters = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      let s = "";
      for (let i = 0; i < 4; i++) s += letters[Math.floor(Math.random() * letters.length)];
      return s;
    }

    function roomRef(code) { return doc(db, "rooms", sanitizeCode(code)); }

    window.firebaseGame = {
      userId,
      sanitizeCode,
      async createRoom(initialGame) {
        for (let tries = 0; tries < 8; tries++) {
          const code = randCode();
          const ref = doc(db, "rooms", code);
          const snap = await getDoc(ref);
          if (!snap.exists()) {
            await setDoc(ref, {
              status: "lobby",
              hostId: userId,
              code,
              createdAt: serverTimestamp(),
              updatedAt: serverTimestamp(),
              game: initialGame
            });
            return code;
          }
        }
        throw new Error("無法產生未使用的房號");
      },
      async roomExists(code) {
        const snap = await getDoc(roomRef(code));
        return snap.exists();
      },
      subscribeRoom(code, cb, errCb) {
        return onSnapshot(roomRef(code), s => cb(s.exists() ? s.data() : null), errCb);
      },
      async claimSeat(code, seatIndex, profile) {
        await runTransaction(db, async (t) => {
          const r = roomRef(code);
          const snap = await t.get(r);
          if (!snap.exists()) throw new Error("房間不存在");
          const data = snap.data();
          if (data.status !== "lobby") throw new Error("遊戲已開始，無法加入");
          const players = [...data.game.players];
          // Release any seat this user already has
          for (let i = 0; i < players.length; i++) {
            if (players[i].userId === userId && i !== seatIndex) {
              players[i] = { ...players[i], claimed: false, userId: null };
            }
          }
          const target = players[seatIndex];
          if (target.claimed && target.userId !== userId) throw new Error("該位置已被佔用");
          players[seatIndex] = { ...target, ...profile, claimed: true, userId };
          t.update(r, { "game.players": players, updatedAt: serverTimestamp() });
        });
      },
      async updateSeat(code, seatIndex, updates) {
        await runTransaction(db, async (t) => {
          const r = roomRef(code);
          const snap = await t.get(r);
          if (!snap.exists()) throw new Error("房間不存在");
          const data = snap.data();
          const players = [...data.game.players];
          if (players[seatIndex].userId !== userId) throw new Error("這不是你的位置");
          players[seatIndex] = { ...players[seatIndex], ...updates };
          t.update(r, { "game.players": players, updatedAt: serverTimestamp() });
        });
      },
      async releaseSeat(code, seatIndex) {
        await runTransaction(db, async (t) => {
          const r = roomRef(code);
          const snap = await t.get(r);
          if (!snap.exists()) return;
          const data = snap.data();
          const players = [...data.game.players];
          if (players[seatIndex].userId !== userId) return;
          players[seatIndex] = {
            ...players[seatIndex],
            claimed: false, userId: null
          };
          t.update(r, { "game.players": players, updatedAt: serverTimestamp() });
        });
      },
      async startGame(code) {
        await runTransaction(db, async (t) => {
          const r = roomRef(code);
          const snap = await t.get(r);
          if (!snap.exists()) throw new Error("房間不存在");
          const data = snap.data();
          if (data.hostId !== userId) throw new Error("只有房主可以開始遊戲");
          const claimed = data.game.players.filter(p => p.claimed);
          if (claimed.length < 2) throw new Error("至少需要 2 位玩家");
          // Find first claimed seat as starting current
          const firstClaimed = data.game.players.findIndex(p => p.claimed);
          t.update(r, {
            status: "playing",
            "game.current": firstClaimed >= 0 ? firstClaimed : 0,
            "game.startedAt": serverTimestamp(),
            updatedAt: serverTimestamp()
          });
        });
      },
      async resetRoom(code, initialGame) {
        await runTransaction(db, async (t) => {
          const r = roomRef(code);
          const snap = await t.get(r);
          if (!snap.exists()) throw new Error("房間不存在");
          if (snap.data().hostId !== userId) throw new Error("只有房主可以重置");
          t.update(r, { status: "lobby", game: initialGame, updatedAt: serverTimestamp() });
        });
      },
      async patchGame(code, patch) {
        // generic update for game state. Use carefully.
        const updates = {};
        for (const k in patch) updates[`game.${k}`] = patch[k];
        updates.updatedAt = serverTimestamp();
        await updateDoc(roomRef(code), updates);
      },
      async tx(code, mutate) {
        // Run arbitrary game-state transformation as a transaction
        await runTransaction(db, async (t) => {
          const r = roomRef(code);
          const snap = await t.get(r);
          if (!snap.exists()) throw new Error("房間不存在");
          const next = mutate(snap.data(), userId);
          if (next) {
            t.update(r, { ...next, updatedAt: serverTimestamp() });
          }
        });
      },
    };
    window.dispatchEvent(new Event("firebase-ready"));
  </script>

      { title: "家裡水電費增加", text: "天氣熱，家中電費變高，這週分擔一點。", effect: -120, kind: "支出", note: "固定支出要放進計畫，節能也能省錢。" },
      { title: "紅包存一半", text: "長輩給紅包，你決定先存一半。", effect: 120, kind: "收入", note: "先存再花，是達成目標的好策略。" },
      { title: "天災愛心捐款", text: "學校發起小額捐款，幫助受災家庭。", effect: -50, kind: "支出", note: "在能力範圍內助人，是有意義的金錢運用。" },
      { title: "幫鄰居整理回收", text: "你用下課後時間幫忙分類回收。", effect: 80, kind: "收入", note: "收入可以來自努力，也能結合環保行動。" },
    ];

    const flowTasks = {
      pay: {
        title: "多元支付流程挑戰",
        image: "assets/payment-flow.png",
        text: "你用電子票證到便利商店買牛奶。請把付款流程排成正確順序。",
        steps: ["先將現金加值到電子票證", "確認加值成功", "到商店選好商品", "感應電子票證完成扣款"],
        reward: 80,
      },
      rights: {
        title: "問題商品怎麼處理",
        image: "assets/consumer-rights.png",
        text: "剛買的商品壞掉了。請排出處理流程，看看能不能找到客服人員協助。",
        steps: ["保留商品和統一發票", "回到店家說明問題", "請店家退貨或更換", "仍無法處理時尋求消費者保護協助"],
        reward: 70,
      },
    };

    const labelTask = {
      title: "商品標示小偵探",
      image: "assets/smart-labels.png",
      text: "購物前先看商品資訊。哪些做法最像聰明消費？",
      options: [
        { label: "先看有效日期、成分、產地、製造商和安全標章", effect: 60, kind: "收入", note: "你會閱讀標示，能降低買到問題商品的風險。" },
        { label: "只看包裝漂亮和價格便宜就決定", effect: -40, kind: "支出", note: "便宜和漂亮不一定安全，購物前要先看標示。" },
      ],
    };

    const quickQuestions = [
      { q: "鞋子破到會進水，買新鞋比較像？", answer: "需要", reward: 50, why: "少了會影響健康與生活。" },
      { q: "同款貼紙已經有很多，看到新款又想買，這比較像？", answer: "想要", reward: 50, why: "它滿足喜好，但不是生活必需。" },
      { q: "同樣是書包，該比較價格、品質和能不能負擔，這叫做？", answer: "評估", reward: 50, why: "需要也要做消費前評估。" },
    ];

    function makeInitialGame() {
      return {
        day: 1,
        current: 0,
        turnsThisDay: 0,
        dice: 1,
        rolling: false,
        pendingMove: null,
        movingPlayerId: null,
        drawing: null,
        sharedModal: null,
        message: "等所有人就位後，房主按下開始遊戲。",
        players: ANIMAL_KEYS.map((animal, i) => ({
          id: i,
          claimed: false,
          userId: null,
          name: names[i],
          animal,
          color: colors[i],
          goal: purchaseItems[i].item,
          target: purchaseItems[i].price,
          daily: purchaseItems[i].daily,
          cash: 0,
          saved: 0,
          position: 0,
          active: true,
          dayLog: [],
        })),
      };
    }

    // -------------- Pure game-state transitions --------------
    function nextTurnPlayers(game) {
      const claimedActive = [];
      game.players.forEach((p, i) => {
        if (p.claimed && p.active && p.cash >= 0) claimedActive.push(i);
      });
      return claimedActive;
    }
    function buildDaySettlement(players) {
      return players.map(p => {
        if (!p.claimed || !p.active || p.cash < 0) return p;
        const saveAmount = Math.min(p.daily, p.cash, Math.max(0, p.target - p.saved));
        if (saveAmount <= 0) return p;
        const ev = {
          title: "每日計畫存款",
          effect: saveAmount,
          kind: "存款",
          note: `今天依計畫存入 $${saveAmount}。`,
          afterCash: p.cash - saveAmount,
        };
        return { ...p, cash: p.cash - saveAmount, saved: p.saved + saveAmount, dayLog: [...(p.dayLog || []), ev] };
      });
    }
    function advanceTurn(game) {
      const order = nextTurnPlayers(game);
      const turns = (game.turnsThisDay || 0) + 1;
      if (order.length === 0) return { ...game, sharedModal: { type: "gameover" } };
      if (turns >= order.length) {
        const settled = buildDaySettlement(game.players);
        return {
          ...game, players: settled, turnsThisDay: turns, pendingMove: null,
          sharedModal: { type: "settle", snapshot: settled.map(p => ({ ...p })) },
          message: `第 ${game.day} 天結束，請大家看結算。`,
        };
      }
      const curIdx = order.indexOf(game.current);
      const nextCur = order[(curIdx + 1) % order.length];
      return {
        ...game, current: nextCur, turnsThisDay: turns, pendingMove: null,
        message: `輪到 ${game.players[nextCur].name}，請擲骰。`,
      };
    }
    function applyTileAction(game, tile, passedStart) {
      let players = [...game.players];
      const cur = game.current;
      const me = players[cur];
      if (passedStart || tile.type === "start") {
        const ev = { title: "經過起點領零用錢", effect: 50, kind: "收入", note: "零用錢進到手上現金。", afterCash: me.cash + 50 };
        players[cur] = { ...me, cash: me.cash + 50, dayLog: [...(me.dayLog || []), ev] };
      }
      if (tile.type === "start") {
        return advanceTurn({ ...game, players, message: `${players[cur].name} 來到起點，揭曉收入 $50。` });
      }
      if (tile.type === "chance" || tile.type === "fate") {
        return { ...game, players, message: `${players[cur].name} 停在${tile.type === "chance" ? "機會" : "命運"}格，請點牌堆抽牌。` };
      }
      if (tile.type === "pay" || tile.type === "rights") {
        return { ...game, players, sharedModal: { type: "flow", taskKey: tile.type } };
      }
      if (tile.type === "label") {
        return { ...game, players, sharedModal: { type: "choice", kind: "label", card: labelTask } };
      }
      if (tile.type === "want") {
        return {
          ...game, players,
          sharedModal: {
            type: "choice", kind: "want",
            card: {
              title: tile.title,
              text: `你心裡冒出一個小聲音：「真的好想要喔！」要怎麼做？`,
              options: [
                { label: "當然要先看我的存錢目標呀！", effect: 30, kind: "收入", note: "你把目標放在心上，少花一次就是多存一次。" },
                { label: `當然要買${tile.title}呀！`, effect: tile.effect, kind: "支出", note: "滿足喜歡的感覺，也要記錄它讓儲蓄慢下來。" },
              ],
            }
          }
        };
      }
      const note = tile.type === "need" ? "生活中的需要支出。" :
                   tile.type === "eco" ? "環保行動讓花費變少。" :
                   tile.type === "work" ? "努力完成日常工作得到收入。" : tile.sub;
      return {
        ...game, players,
        sharedModal: {
          type: "choice", kind: "daily",
          card: {
            title: tile.title,
            text: `你停在「${tile.title}」。請讀完情境後做選擇，選完才揭曉金額。`,
            options: [
              { label: tile.type === "need" ? "這是生活需要，我願意負責處理" : "我願意完成這個日常任務",
                effect: tile.effect, kind: tile.effect >= 0 ? "收入" : "支出", note },
              { label: "我想先和同學討論，再做決定", effect: 0, kind: "反思", note: "先停下來討論，是做選擇前的重要練習。" },
            ],
          }
        }
      };
    }
    function applyCardChoice(game, option) {
      const cur = game.current;
      const me = game.players[cur];
      const modalCard = game.sharedModal && game.sharedModal.card;
      const ev = {
        title: (modalCard && modalCard.title) || "選擇",
        effect: option.effect,
        kind: option.kind || ((game.sharedModal && game.sharedModal.kind === "fate") ? "支出" : "反思"),
        note: option.note || "",
        afterCash: me.cash + option.effect,
      };
      const players = [...game.players];
      players[cur] = { ...me, cash: me.cash + option.effect, dayLog: [...(me.dayLog || []), ev] };
      return advanceTurn({
        ...game, players, sharedModal: null, pendingMove: null,
        message: `${me.name}：${ev.note}，揭曉金額 ${option.effect >= 0 ? "+" : "-"}$${Math.abs(option.effect)}。`
      });
    }
    function applyFlowResult(game, correct) {
      const task = flowTasks[game.sharedModal.taskKey];
      const cur = game.current;
      const me = game.players[cur];
      const effect = correct ? task.reward : -30;
      const ev = {
        title: task.title, effect,
        kind: effect >= 0 ? "收入" : "支出",
        note: correct ? "流程排序正確，成功完成任務。" : "流程還需要再調整，先記錄一次學習成本。",
        afterCash: me.cash + effect,
      };
      const players = [...game.players];
      players[cur] = { ...me, cash: me.cash + effect, dayLog: [...(me.dayLog || []), ev] };
      return advanceTurn({
        ...game, players, sharedModal: null, pendingMove: null,
        message: `${me.name} 完成「${task.title}」，${correct ? "完全答對" : "還要再練習"}。`
      });
    }
    function applyQuestionAnswer(game, ans) {
      const q = game.sharedModal.question;
      const cur = game.current;
      const me = game.players[cur];
      const correct = ans === q.answer;
      const ev = correct
        ? { title: "需要想要判斷成功", effect: q.reward, kind: "收入", note: q.why, afterCash: me.cash + q.reward }
        : { title: "需要想要再想想", effect: 0, kind: "反思", note: q.why, afterCash: me.cash };
      const players = [...game.players];
      players[cur] = { ...me, cash: me.cash + ev.effect, dayLog: [...(me.dayLog || []), ev] };
      return advanceTurn({
        ...game, players, sharedModal: null, pendingMove: null,
        message: correct ? `答對了！${q.why}` : `先沒關係，我們一起修正：${q.why}`,
      });
    }
    function startNextDay(game) {
      const players = game.players.map(p => ({
        ...p,
        active: p.claimed && p.cash >= 0,
        dayLog: [],
      }));
      const order = [];
      players.forEach((p, i) => { if (p.claimed && p.active && p.cash >= 0) order.push(i); });
      return {
        ...game, players,
        current: order.length ? order[0] : game.current,
        turnsThisDay: 0,
        day: (game.day || 1) + 1,
        sharedModal: null,
        pendingMove: null,
        message: "新的一天開始了，請繼續擲骰子。",
      };
    }
    function money(n) { return `${n < 0 ? "-" : ""}$${Math.abs(n)}`; }
    function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }
    function financialPosition(player) {
      return player.cash + player.saved;
    }

    function Dice({ value, rolling, onClick }) {
      const pips = {
        1: [4], 2: [0, 8], 3: [0, 4, 8], 4: [0, 2, 6, 8], 5: [0, 2, 4, 6, 8], 6: [0, 2, 3, 5, 6, 8],
      };
      const safe = pips[value] || pips[1];
      const clickable = !!onClick;
      return <button type="button" disabled={!clickable} onClick={onClick}
                     className={`dice2d ${rolling ? "rolling" : ""} ${clickable ? "clickable" : ""}`}
                     aria-label={`骰子 ${value} 點${clickable ? "（點我擲骰）" : ""}`}>
        {Array.from({length: 9}).map((_, i) => (
          <span key={i} className={`pip ${safe.includes(i) ? "on" : ""}`}></span>
        ))}
      </button>;
    }

    function FlowTask({ task, onDone }) {
      const [items, setItems] = useState(() => [...task.steps].sort(() => Math.random() - .5));
      const [dragIndex, setDragIndex] = useState(null);
      const correct = items.every((item, i) => item === task.steps[i]);
      function move(from, to) {
        const next = [...items];
        const [picked] = next.splice(from, 1);
        next.splice(to, 0, picked);
        setItems(next);
      }
      return <div>
        <img src={task.image} className="task-image" alt="" />
        <p className="mt-2 text-lg leading-8 text-slate-700">{task.text}</p>
        <div className="mt-4 grid gap-2">
          {items.map((item, i) => <div
            key={item}
            draggable
            onDragStart={() => setDragIndex(i)}
            onDragOver={e => e.preventDefault()}
            onDrop={() => dragIndex !== null && move(dragIndex, i)}
            className="sortable-item rounded-2xl border-2 border-slate-200 bg-slate-50 p-3 font-black"
          >{i + 1}. {item}</div>)}
        </div>
        <button onClick={() => onDone(correct)} className="mt-5 w-full rounded-2xl bg-[#067ca3] px-4 py-4 text-xl font-black text-white">確認排序</button>
      </div>;
    }

    // -------------- Routing / Firebase hooks --------------
    function parseRoute() {
      const h = (window.location.hash || "").replace(/^#\/?/, "");
      const parts = h.split("/").filter(Boolean);
      if (parts[0] === "room" && parts[1]) {
        const c = ((window.firebaseGame && window.firebaseGame.sanitizeCode) || (s => (s||"").toUpperCase()))(parts[1]);
        return { name: "room", code: c };
      }
      return { name: "home" };
    }
    function navigate(path) {
      window.location.hash = path.startsWith("/") ? path : "/" + path;
    }
    function useRoute() {
      const [r, setR] = useState(parseRoute());
      useEffect(() => {
        const on = () => setR(parseRoute());
        window.addEventListener("hashchange", on);
        return () => window.removeEventListener("hashchange", on);
      }, []);
      return r;
    }
    function useFirebaseReady() {
      const [ready, setReady] = useState(Boolean(window.firebaseGame));
      useEffect(() => {
        if (window.firebaseGame) { setReady(true); return; }
        const on = () => setReady(true);
        window.addEventListener("firebase-ready", on);
        return () => window.removeEventListener("firebase-ready", on);
      }, []);
      return ready;
    }
    function useRoom(code) {
      const [s, setS] = useState({ loading: true, room: null, error: null });
      useEffect(() => {
        if (!code || !window.firebaseGame) return;
        setS({ loading: true, room: null, error: null });
        const unsub = window.firebaseGame.subscribeRoom(code,
          r => setS({ loading: false, room: r, error: null }),
          e => setS({ loading: false, room: null, error: e })
        );
        return unsub;
      }, [code]);
      return s;
    }
    function useMyPlayer(room) {
      if (!room) return { mySeat: -1, me: null };
      const uid = window.firebaseGame ? window.firebaseGame.userId : null;
      const seat = room.game.players.findIndex(p => p.userId === uid && p.claimed);
      return { mySeat: seat, me: seat >= 0 ? room.game.players[seat] : null };
    }

    function CenteredCard({ children }) {
      return <div className="grid min-h-screen place-items-center bg-gradient-to-br from-rose-50 via-amber-50 to-sky-50 p-6">
        <div className="rounded-3xl border-4 border-white bg-white/85 px-10 py-8 text-center shadow-xl backdrop-blur">{children}</div>
      </div>;
    }

    // -------------- App / Home / Room dispatch --------------
    function App() {
      const route = useRoute();
      const ready = useFirebaseReady();
      if (!ready) {
        return <CenteredCard><div className="text-5xl">☁️</div><div className="mt-3 font-black text-slate-600">正在連線雲端...</div></CenteredCard>;
      }
      if (route.name === "room") return <RoomScreen code={route.code} />;
      return <Home />;
    }

    function Home() {
      const [mode, setMode] = useState("main");
      const [joinCode, setJoinCode] = useState("");
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState("");

      async function onCreate() {
        if (busy) return;
        setBusy(true); setErr("");
        try {
          const code = await window.firebaseGame.createRoom(makeInitialGame());
          navigate(`/room/${code}`);
        } catch (e) {
          setErr(e.message || String(e));
          setBusy(false);
        }
      }
      async function onJoin() {
        if (busy) return;
        const code = window.firebaseGame.sanitizeCode(joinCode);
        if (code.length < 4) { setErr("請輸入 4 碼房號"); return; }
        setBusy(true); setErr("");
        try {
          const exists = await window.firebaseGame.roomExists(code);
          if (!exists) { setErr(`找不到房間 ${code}`); setBusy(false); return; }
          navigate(`/room/${code}`);
        } catch (e) { setErr(e.message || String(e)); setBusy(false); }
      }

      return <main className="min-h-screen bg-gradient-to-br from-rose-100 via-amber-50 to-sky-100">
        <div className="mx-auto max-w-5xl px-4 py-8 md:px-6 md:py-12">
          <div className="overflow-hidden rounded-[40px] border-[6px] border-white bg-white/70 shadow-[0_30px_60px_rgba(244,114,182,.20)] backdrop-blur">
            <div className="relative">
              <img src="assets/home-hero.png" alt="" className="aspect-[16/9] w-full object-cover"
                   onError={e => { e.target.style.display = "none"; }} />
              <div className="absolute inset-0 bg-gradient-to-t from-white via-white/40 to-transparent"></div>
              <div className="absolute inset-x-0 bottom-0 p-6 text-center md:p-10">
                <p className="inline-flex rounded-full bg-rose-100/90 px-4 py-1.5 text-sm font-black text-rose-700 shadow-sm">PBL 專題</p>
                <h1 className="mt-3 text-4xl font-black tracking-tight text-slate-800 drop-shadow-sm md:text-5xl">儲蓄與消費的選擇</h1>
                <p className="mt-1 text-lg font-bold text-slate-600 md:text-xl">✦ 生活理財大富翁 ✦</p>
              </div>
            </div>
            <div className="p-6 md:p-10">
              {mode === "main" && <div className="grid gap-4 md:grid-cols-2">
                <button disabled={busy} onClick={onCreate} className="group relative overflow-hidden rounded-3xl bg-gradient-to-br from-rose-400 via-pink-400 to-rose-500 p-8 text-left shadow-[0_12px_0_rgba(244,63,94,.32)] transition active:translate-y-1.5 active:shadow-[0_4px_0_rgba(244,63,94,.32)] disabled:opacity-50">
                  <div className="text-5xl drop-shadow">🎲</div>
                  <div className="mt-3 text-2xl font-black text-white drop-shadow-sm">建立新遊戲</div>
                  <div className="mt-1 text-sm font-bold text-rose-50">當房主、開新一局</div>
                </button>
                <button disabled={busy} onClick={() => { setMode("join"); setErr(""); }} className="group relative overflow-hidden rounded-3xl bg-gradient-to-br from-sky-400 via-indigo-400 to-violet-500 p-8 text-left shadow-[0_12px_0_rgba(99,102,241,.32)] transition active:translate-y-1.5 active:shadow-[0_4px_0_rgba(99,102,241,.32)] disabled:opacity-50">
                  <div className="text-5xl drop-shadow">🚪</div>
                  <div className="mt-3 text-2xl font-black text-white drop-shadow-sm">加入遊戲</div>
                  <div className="mt-1 text-sm font-bold text-sky-50">輸入房號跟同學一起玩</div>
                </button>
              </div>}
              {mode === "join" && <div className="space-y-5">
                <div>
                  <label className="text-sm font-black text-slate-600">輸入房號（4 碼英數字）</label>
                  <input autoFocus value={joinCode}
                         onChange={e => setJoinCode((e.target.value || "").toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 6))}
                         onKeyDown={e => e.key === "Enter" && onJoin()}
                         placeholder="ABCD"
                         className="mt-2 w-full rounded-3xl border-4 border-sky-200 bg-white px-6 py-5 text-center text-4xl font-black tracking-[0.5em] text-slate-700 shadow-inner outline-none focus:border-sky-400" />
                </div>
                <div className="grid gap-3 md:grid-cols-2">
                  <button onClick={() => { setMode("main"); setJoinCode(""); setErr(""); }} className="rounded-2xl bg-slate-200 px-5 py-4 font-black text-slate-700 active:translate-y-0.5">取消</button>
                  <button disabled={busy || joinCode.length < 4} onClick={onJoin} className="rounded-2xl bg-sky-500 px-5 py-4 font-black text-white shadow-[0_8px_0_rgba(14,165,233,.32)] active:translate-y-1 active:shadow-[0_2px_0_rgba(14,165,233,.32)] disabled:bg-slate-300">確認加入</button>
                </div>
              </div>}
              {err && <p className="mt-5 rounded-2xl bg-rose-50 p-3 text-center text-sm font-black text-rose-700">{err}</p>}
              <p className="mt-8 text-center text-xs font-bold text-slate-400">設計者：新北市網溪國小 Kiki 老師 ｜ 角色與插畫：Gemini Nano Banana Pro</p>
            </div>
          </div>
        </div>
      </main>;
    }

    function RoomScreen({ code }) {
      const { loading, room, error } = useRoom(code);
      if (loading) return <CenteredCard><div className="text-5xl animate-pulse">🎲</div><div className="mt-3 font-black text-slate-600">載入房間 {code}...</div></CenteredCard>;
      if (error) return <CenteredCard>
        <div className="text-5xl">😢</div>
        <div className="mt-3 font-black text-rose-600">讀取錯誤</div>
        <div className="mt-1 text-xs text-rose-500">{String(error.message || error)}</div>
        <button onClick={() => navigate("/")} className="mt-4 rounded-2xl bg-slate-700 px-5 py-2 font-black text-white">回首頁</button>
      </CenteredCard>;
      if (!room) return <CenteredCard>
        <div className="text-5xl">🔍</div>
        <div className="mt-3 font-black text-slate-600">找不到房間 {code}</div>
        <button onClick={() => navigate("/")} className="mt-4 rounded-2xl bg-rose-500 px-5 py-2 font-black text-white">回首頁</button>
      </CenteredCard>;
      if (room.status === "lobby") return <Lobby code={code} room={room} />;
      return <Game code={code} room={room} />;
    }

    // -------------- Lobby --------------
    function Lobby({ code, room }) {
      const { mySeat } = useMyPlayer(room);
      const isHost = room.hostId === window.firebaseGame.userId;
      const claimedCount = room.game.players.filter(p => p.claimed).length;
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState("");
      const [copied, setCopied] = useState(false);

      async function claim(i) {
        setBusy(true); setErr("");
        try { await window.firebaseGame.claimSeat(code, i, {}); }
        catch (e) { setErr(e.message); }
        setBusy(false);
      }
      async function release(i) {
        setBusy(true); setErr("");
        try { await window.firebaseGame.releaseSeat(code, i); }
        catch (e) { setErr(e.message); }
        setBusy(false);
      }
      async function updateMe(updates) {
        if (mySeat < 0) return;
        try { await window.firebaseGame.updateSeat(code, mySeat, updates); }
        catch (e) { setErr(e.message); }
      }
      async function onStart() {
        setBusy(true); setErr("");
        try { await window.firebaseGame.startGame(code); }
        catch (e) { setErr(e.message); }
        setBusy(false);
      }
      function copyCode() {
        try { navigator.clipboard.writeText(code); setCopied(true); setTimeout(() => setCopied(false), 1500); } catch (e) {}
      }
      function copyLink() {
        const url = window.location.origin + window.location.pathname + "#/room/" + code;
        try { navigator.clipboard.writeText(url); setCopied(true); setTimeout(() => setCopied(false), 1500); } catch (e) {}
      }

      return <main className="min-h-screen bg-gradient-to-br from-rose-100 via-amber-50 to-sky-100 p-4 md:p-8">
        <div className="mx-auto max-w-6xl">
          <header className="mb-5 flex flex-wrap items-center justify-between gap-3 rounded-3xl border-4 border-white bg-white/85 p-5 shadow-[0_18px_40px_rgba(244,114,182,.12)] backdrop-blur">
            <div>
              <p className="inline-flex rounded-full bg-amber-100 px-3 py-1 text-xs font-black text-amber-800">等待室 ｜ Lobby</p>
              <h1 className="mt-2 text-2xl font-black text-slate-800 md:text-3xl">點動物選你要當的角色 🐾</h1>
              <p className="mt-1 text-sm font-bold text-slate-500">至少 2 人才能開始</p>
            </div>
            <div className="text-right">
              <p className="text-xs font-bold text-slate-500">房號（點擊複製）</p>
              <button onClick={copyCode} className="block text-5xl font-black tracking-[0.25em] text-rose-500 transition active:scale-95">{code}</button>
              <button onClick={copyLink} className="mt-1 text-xs font-black text-sky-500 underline">複製連結</button>
              {copied && <p className="mt-1 text-xs font-black text-emerald-600">已複製 ✓</p>}
            </div>
          </header>

          <div className="grid gap-3 md:grid-cols-2 lg:grid-cols-3">
            {room.game.players.map((p, i) => (
              <SeatCard key={i} player={p}
                        mine={mySeat === i}
                        otherClaimed={p.claimed && mySeat !== i}
                        onClaim={() => claim(i)}
                        onRelease={() => release(i)}
                        onUpdate={updateMe}
                        busy={busy} />
            ))}
          </div>

          {err && <p className="mt-4 rounded-2xl bg-rose-100 p-3 text-center text-sm font-black text-rose-700">{err}</p>}

          <div className="mt-6 flex flex-wrap justify-between gap-3">
            <button onClick={() => navigate("/")} className="rounded-2xl bg-white px-5 py-3 font-black text-slate-700 shadow-md">離開回首頁</button>
            {isHost ? (
              <button disabled={busy || claimedCount < 2} onClick={onStart}
                      className="rounded-2xl bg-gradient-to-r from-emerald-400 to-teal-500 px-10 py-3 text-xl font-black text-white shadow-[0_10px_0_rgba(16,185,129,.4)] transition active:translate-y-1 active:shadow-[0_3px_0_rgba(16,185,129,.4)] disabled:bg-slate-300 disabled:shadow-none">
                {claimedCount < 2 ? `再等 ${2 - claimedCount} 人` : `開始遊戲（${claimedCount}/6）`}
              </button>
            ) : (
              <div className="self-center rounded-2xl bg-white px-5 py-2 text-sm font-black text-slate-500 shadow-md">⏳ 等房主開始（{claimedCount}/6）</div>
            )}
          </div>
        </div>
      </main>;
    }

    function SeatCard({ player, mine, otherClaimed, onClaim, onRelease, onUpdate, busy }) {
      const status = otherClaimed ? "已被選" : (mine ? "你選的 ✓" : "點我加入");
      return <div className={`rounded-3xl border-[5px] p-4 shadow-md transition ${
        mine ? "border-emerald-400 bg-emerald-50/80 ring-4 ring-emerald-100" :
        otherClaimed ? "border-slate-200 bg-white/70" :
        "border-pink-200 bg-white hover:-translate-y-0.5 hover:border-pink-300 hover:shadow-lg"
      }`}>
        <button disabled={otherClaimed || busy} onClick={mine ? onRelease : onClaim} className="block w-full text-left disabled:cursor-not-allowed">
          <div className="flex items-center gap-3">
            <AnimalAvatar animal={player.animal} color={player.color} size="lg" />
            <div className="flex-1">
              <div className="text-lg font-black text-slate-800">{player.name}</div>
              <div className="text-xs font-black" style={{ color: player.color }}>{status}</div>
              {(mine || otherClaimed) && (
                <div className="mt-1 text-xs font-bold text-slate-500">目標：{player.goal}（${player.target}）</div>
              )}
            </div>
          </div>
        </button>
        {mine && (
          <div className="mt-3 space-y-2">
            <label className="block">
              <span className="text-xs font-black text-slate-500">我的名字</span>
              <input value={player.name} onChange={e => onUpdate({ name: e.target.value.slice(0, 10) })}
                     className="mt-1 w-full rounded-xl border-2 border-emerald-200 bg-white px-3 py-2 font-black text-slate-800 outline-none focus:border-emerald-400" />
            </label>
            <label className="block">
              <span className="text-xs font-black text-slate-500">儲蓄目標</span>
              <select value={player.goal} onChange={e => {
                const it = purchaseItems.find(x => x.item === e.target.value);
                onUpdate({ goal: it.item, target: it.price, daily: it.daily });
              }} className="mt-1 w-full rounded-xl border-2 border-emerald-200 bg-white px-3 py-2 font-black text-slate-800 outline-none focus:border-emerald-400">
                {purchaseItems.map(it => <option key={it.item} value={it.item}>{it.item}（${it.price}）</option>)}
              </select>
            </label>
            <div className="grid grid-cols-2 gap-2 text-xs font-black text-slate-500">
              <label>目標金額
                <input type="number" value={player.target} onChange={e => onUpdate({ target: Number(e.target.value) || 0 })}
                       className="mt-1 w-full rounded-lg border-2 border-emerald-200 bg-white px-2 py-1 text-slate-800" />
              </label>
              <label>每日存
                <input type="number" value={player.daily} onChange={e => onUpdate({ daily: Number(e.target.value) || 0 })}
                       className="mt-1 w-full rounded-lg border-2 border-emerald-200 bg-white px-2 py-1 text-slate-800" />
              </label>
            </div>
            <button onClick={onRelease} className="w-full rounded-xl bg-slate-200 py-2 text-xs font-black text-slate-700 hover:bg-slate-300">取消加入</button>
          </div>
        )}
      </div>;
    }

    function AnimalAvatar({ animal, color, size = "md" }) {
      const px = size === "lg" ? 80 : size === "sm" ? 28 : size === "xs" ? 22 : 48;
      const [errored, setErrored] = useState(false);
      return errored ? (
        <span className="grid place-items-center rounded-full border-[3px] bg-white font-bold"
              style={{ width: px, height: px, borderColor: color, fontSize: px * 0.55 }}>
          {animalEmoji(animal)}
        </span>
      ) : (
        <img src={animalImg(animal)} alt={animal}
             className="rounded-full border-[3px] bg-white object-cover"
             style={{ width: px, height: px, borderColor: color }}
             onError={() => setErrored(true)} />
      );
    }

    // -------------- Game --------------
    function Game({ code, room }) {
      const g = room.game;
      const { mySeat, me } = useMyPlayer(room);
      const isHost = room.hostId === window.firebaseGame.userId;
      const currentPlayer = g.players[g.current] || g.players[0];
      const isMyTurn = mySeat === g.current && currentPlayer.claimed;
      const claimedPlayers = g.players.filter(p => p.claimed);
      const activeClaimed = g.players.filter(p => p.claimed && p.active && p.cash >= 0);

      const [musicOn, setMusicOn] = useState(false);
      const [notesValue, setNotesValue] = useState("");
      const audioReady = useRef(false);
      const autoOpenedFor = useRef(null);

      // Load private notes
      useEffect(() => {
        if (mySeat < 0) return;
        const key = `monopoly:${code}:notes:${mySeat}`;
        setNotesValue(localStorage.getItem(key) || "");
      }, [code, mySeat]);

      function saveNotes(v) {
        setNotesValue(v);
        if (mySeat >= 0) localStorage.setItem(`monopoly:${code}:notes:${mySeat}`, v);
      }

      // Audio
      function unlockAudio() {
        if (audioReady.current) return;
        audioReady.current = true;
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) window.gameAudio = new AC();
      }
      function beep(freq = 440, dur = .12, type = "sine", gain = .05) {
        try {
          unlockAudio();
          const ctx = window.gameAudio;
          if (!ctx) return;
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.type = type;
          osc.frequency.value = freq;
          g.gain.setValueAtTime(gain, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + dur);
          osc.connect(g).connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + dur);
        } catch (e) {}
      }
      function rollSound() { [180, 260, 340, 460].forEach((f, i) => setTimeout(() => beep(f, .08, "square", .035), i * 90)); }
      function cardSound() { [520, 660, 780].forEach((f, i) => setTimeout(() => beep(f, .08, "triangle", .04), i * 75)); }
      async function toggleMusic() {
        const bgm = document.getElementById("bgm");
        if (!bgm) return;
        if (!musicOn) {
          try { await bgm.play(); setMusicOn(true); } catch (e) {}
        } else {
          bgm.pause(); setMusicOn(false);
        }
      }

      // ---- Actions (only effective when isMyTurn or specified) ----
      async function rollDice() {
        if (!isMyTurn || g.rolling || g.pendingMove || g.sharedModal) return;
        unlockAudio(); rollSound();
        const value = Math.ceil(Math.random() * 6);
        try {
          // ONE atomic transaction: roll + move + clear rolling flag once written
          await window.firebaseGame.tx(code, (data) => {
            const ga = data.game;
            if (ga.rolling || ga.pendingMove || ga.sharedModal) return null;
            const cur = ga.current;
            const startPos = ga.players[cur].position;
            const passed = startPos + value >= tiles.length;
            const finalPos = (startPos + value) % tiles.length;
            const players = [...ga.players];
            players[cur] = { ...players[cur], position: finalPos };
            return {
              "game.rolling": true,
              "game.dice": value,
              "game.players": players,
              "game.pendingMove": { playerId: cur, tileIndex: finalPos, passedStart: passed },
              "game.message": `${players[cur].name} 擲出 ${value} 點，走到「${tiles[finalPos].title}」。`,
            };
          });
          // Clear rolling flag after a short local-only delay for dice shake animation
          setTimeout(async () => {
            await window.firebaseGame.tx(code, (data) => {
              if (!data.game.rolling) return null;
              return { "game.rolling": false };
            });
          }, 700);
        } catch (e) { console.error(e); }
      }

      async function openTileTask(tileIdx) {
        if (!isMyTurn || !g.pendingMove || g.pendingMove.tileIndex !== tileIdx) return;
        try {
          await window.firebaseGame.tx(code, (data) => {
            const ga = data.game;
            if (!ga.pendingMove) return null;
            const t = tiles[ga.pendingMove.tileIndex];
            const newGame = applyTileAction(ga, t, ga.pendingMove.passedStart);
            return { game: newGame };
          });
        } catch (e) { console.error(e); }
      }

      // Auto-open the tile task after the dice settles (so player doesn't need an extra click)
      useEffect(() => {
        if (!isMyTurn) return;
        if (g.rolling) return;
        if (!g.pendingMove) { autoOpenedFor.current = null; return; }
        if (g.sharedModal) return;
        const key = `${g.day}-${g.pendingMove.tileIndex}-${g.pendingMove.playerId}`;
        if (autoOpenedFor.current === key) return;
        const tileType = tiles[g.pendingMove.tileIndex].type;
        // Chance / Fate tiles need the user to click the card stack, don't auto-open
        if (tileType === "chance" || tileType === "fate") return;
        autoOpenedFor.current = key;
        const t = setTimeout(() => { openTileTask(g.pendingMove.tileIndex); }, 450);
        return () => clearTimeout(t);
      }, [g.rolling, g.pendingMove, g.sharedModal, g.day, isMyTurn]);

      async function drawCard(kind) {
        if (!isMyTurn || !g.pendingMove) return;
        const deck = kind === "chance" ? chanceCards : fateCards;
        const card = deck[Math.floor(Math.random() * deck.length)];
        cardSound();
        try {
          await window.firebaseGame.tx(code, () => ({ "game.drawing": kind }));
          setTimeout(async () => {
            await window.firebaseGame.tx(code, () => ({
              "game.drawing": null,
              "game.sharedModal": card.options
                ? { type: "choice", kind, card }
                : { type: "event", kind, card },
            }));
          }, 700);
        } catch (e) { console.error(e); }
      }

      async function applyChoice(option) {
        try {
          await window.firebaseGame.tx(code, (data) => ({
            game: applyCardChoice(data.game, option),
          }));
        } catch (e) { console.error(e); }
      }
      async function applyEvent() {
        if (!g.sharedModal || !g.sharedModal.card) return;
        applyChoice(g.sharedModal.card);
      }
      async function finishFlow(correct) {
        try {
          await window.firebaseGame.tx(code, (data) => ({
            game: applyFlowResult(data.game, correct),
          }));
        } catch (e) { console.error(e); }
      }
      async function answerQuestion(ans) {
        try {
          await window.firebaseGame.tx(code, (data) => ({
            game: applyQuestionAnswer(data.game, ans),
          }));
        } catch (e) { console.error(e); }
      }
      async function continueDay() {
        try {
          await window.firebaseGame.tx(code, (data) => ({
            game: startNextDay(data.game),
          }));
        } catch (e) { console.error(e); }
      }
      async function resetToLobby() {
        if (!isHost) return;
        if (!window.confirm("確定要重置遊戲、回到等待室嗎？")) return;
        try {
          await window.firebaseGame.resetRoom(code, makeInitialGame());
        } catch (e) { console.error(e); }
      }

      const pendingTile = g.pendingMove ? tiles[g.pendingMove.tileIndex] : null;
      const canDrawChance = isMyTurn && g.pendingMove && pendingTile && pendingTile.type === "chance" && !g.sharedModal;
      const canDrawFate   = isMyTurn && g.pendingMove && pendingTile && pendingTile.type === "fate"   && !g.sharedModal;
      const allOut = activeClaimed.length === 0;

      return <main className="min-h-screen bg-gradient-to-br from-rose-50 via-amber-50 to-sky-50">
        <div className="mx-auto max-w-[1500px] p-2 md:p-4">
          <header className="mb-3 flex flex-wrap items-center justify-between gap-2 rounded-2xl border-[3px] border-white bg-white/85 px-4 py-2 shadow-md backdrop-blur">
            <div className="flex flex-wrap items-center gap-3">
              <span className="rounded-full bg-amber-100 px-3 py-1 text-xs font-black text-amber-800">房號 {code}</span>
              <span className="rounded-full bg-sky-100 px-3 py-1 text-sm font-black text-sky-800">第 {g.day} 天</span>
              <div className="flex items-center gap-2">
                <AnimalAvatar animal={currentPlayer.animal} color={currentPlayer.color} size="sm" />
                <span className="text-sm font-black" style={{ color: currentPlayer.color }}>
                  {currentPlayer.name}{isMyTurn && " (你)"} 的回合
                </span>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={toggleMusic} className="rounded-xl bg-sky-100 px-3 py-1.5 text-xs font-black text-sky-800">{musicOn ? "🔇 關音樂" : "🎵 播音樂"}</button>
              {isHost && <button onClick={resetToLobby} className="rounded-xl bg-slate-200 px-3 py-1.5 text-xs font-black text-slate-700">重置</button>}
              <button onClick={() => navigate("/")} className="rounded-xl bg-rose-100 px-3 py-1.5 text-xs font-black text-rose-700">離開</button>
            </div>
          </header>

          <div className="grid gap-3 xl:grid-cols-[1fr_360px]">
            <div className="rounded-3xl border-[3px] border-white bg-white/85 p-3 shadow-lg">
              {/* Dice + status bar */}
              {(() => {
                const canRoll = isMyTurn && !g.rolling && !g.pendingMove && !g.sharedModal && !allOut;
                return <div className="mb-2 flex flex-wrap items-center gap-4 rounded-2xl bg-gradient-to-r from-rose-50 via-amber-50 to-sky-50 p-3 md:gap-6 md:p-4">
                  <div className="flex flex-col items-center gap-1">
                    <Dice value={g.dice} rolling={g.rolling} onClick={canRoll ? rollDice : null} />
                    <p className="text-[10px] font-black text-slate-500">
                      {canRoll ? "👆 點我擲骰" : g.rolling ? "擲骰中..." : "骰子"}
                    </p>
                  </div>
                  <div className="grid min-w-[88px] place-items-center rounded-2xl border-2 border-rose-200 bg-white px-3 py-2 shadow-inner">
                    <p className="text-[10px] font-black text-slate-500">點數</p>
                    <p className="text-5xl font-black leading-none text-rose-500 tabular-nums">{g.dice}</p>
                  </div>
                  <div className="min-w-0 flex-1 px-1 text-center">
                    <p className="text-sm font-black leading-tight text-slate-700">{g.message}</p>
                    {!isMyTurn && !g.rolling && !g.pendingMove && !g.sharedModal && !allOut && (
                      <p className="mt-1 text-xs font-black text-slate-500">⏳ 等 {currentPlayer.name} 擲骰</p>
                    )}
                  </div>
                </div>;
              })()}

              <div className="game-board">
                {tiles.map((t, i) => {
                  const [x, y] = coordsWide[i];
                  const here = g.players.filter(p => p.claimed && p.position === i);
                  const canOpen = isMyTurn && g.pendingMove && g.pendingMove.tileIndex === i && !g.sharedModal;
                  return <button key={i}
                                 onClick={canOpen ? () => openTileTask(i) : undefined}
                                 disabled={!canOpen}
                                 className={`tile ${g.pendingMove && g.pendingMove.tileIndex === i ? "active" : ""}`}
                                 style={{ left: `${x}%`, top: `${y}%` }}
                                 aria-label={`${t.title} ${t.sub}`}>
                    <div>
                      <div className="tile-title">{t.title}</div>
                      <div className="tile-sub">{t.sub}</div>
                    </div>
                    <div className="tokens">
                      {here.map((p, idx) => (
                        <span key={p.id} className={`token-wrap ${g.movingPlayerId === p.id ? "moving" : ""}`}
                              style={{ "--i": idx, "--n": here.length }}>
                          <AnimalAvatar animal={p.animal} color={p.color} size="xs" />
                        </span>
                      ))}
                    </div>
                  </button>;
                })}

                <button disabled={!canDrawChance}
                        onClick={() => drawCard("chance")}
                        className={`card-zone chance ${g.drawing === "chance" ? "drawing" : ""}`}
                        aria-label="抽機會卡">
                  <img src="assets/card-chance-back.png" alt=""
                       className="absolute inset-0 h-full w-full rounded-2xl object-cover shadow-lg" />
                  {canDrawChance && <span className="absolute -bottom-1 left-1/2 -translate-x-1/2 rounded-full bg-rose-500 px-2 py-0.5 text-[10px] font-black text-white shadow-md">點我抽</span>}
                </button>
                <button disabled={!canDrawFate}
                        onClick={() => drawCard("fate")}
                        className={`card-zone fate ${g.drawing === "fate" ? "drawing" : ""}`}
                        aria-label="抽命運卡">
                  <img src="assets/card-fate-back.png" alt=""
                       className="absolute inset-0 h-full w-full rounded-2xl object-cover shadow-lg" />
                  {canDrawFate && <span className="absolute -bottom-1 left-1/2 -translate-x-1/2 rounded-full bg-teal-500 px-2 py-0.5 text-[10px] font-black text-white shadow-md">點我抽</span>}
                </button>
              </div>

              {/* All players strip */}
              <div className="mt-3 grid grid-cols-2 gap-2 sm:grid-cols-3 lg:grid-cols-6">
                {claimedPlayers.map(p => (
                  <PlayerChip key={p.id} player={p} isCurrent={g.current === p.id} me={mySeat === p.id} />
                ))}
              </div>
            </div>

            <aside className="grid content-start gap-3">
              {me ? <MyPanel me={me} isMyTurn={isMyTurn} notesValue={notesValue} onNotesChange={saveNotes} /> :
                    <SpectatorPanel />}
            </aside>
          </div>

          {g.sharedModal && (
            <SharedModal modal={g.sharedModal} g={g} isMyTurn={isMyTurn} currentPlayer={currentPlayer}
                         onApplyChoice={applyChoice}
                         onApplyEvent={applyEvent}
                         onFinishFlow={finishFlow}
                         onAnswerQuestion={answerQuestion}
                         onContinue={continueDay} />
          )}
        </div>
      </main>;
    }

    function PlayerChip({ player, isCurrent, me }) {
      const out = !player.active || player.cash < 0;
      const progress = clamp((player.saved / Math.max(1, player.target)) * 100, 0, 100);
      return <div className={`relative flex items-center gap-2 rounded-2xl border-[3px] p-2 transition ${
        isCurrent ? "border-amber-400 bg-amber-50 shadow-md scale-[1.02]" :
        "border-white bg-white/70"
      } ${out ? "opacity-50 grayscale" : ""}`}>
        <AnimalAvatar animal={player.animal} color={player.color} size="md" />
        <div className="min-w-0 flex-1">
          <div className="truncate text-xs font-black text-slate-800">{player.name}{me && " ⭐"}</div>
          <div className="text-[10px] font-black text-slate-500">已存 ${player.saved}/${player.target}</div>
          <div className="mt-0.5 h-1.5 overflow-hidden rounded-full bg-slate-100">
            <div className="h-full bg-gradient-to-r from-emerald-400 to-teal-500"
                 style={{ width: `${progress}%` }}></div>
          </div>
        </div>
      </div>;
    }

    function MyPanel({ me, isMyTurn, notesValue, onNotesChange }) {
      const goalProgress = clamp((me.saved / Math.max(1, me.target)) * 100, 0, 100);
      const reached = me.saved >= me.target;
      return <>
        <div className={`rounded-3xl border-[3px] p-4 shadow-md transition ${isMyTurn ? "border-amber-400 bg-amber-50 ring-4 ring-amber-100" : "border-white bg-white/85"}`}>
          <div className="flex items-center gap-3">
            <AnimalAvatar animal={me.animal} color={me.color} size="lg" />
            <div>
              <p className="text-xs font-black text-slate-400">我是</p>
              <p className="text-xl font-black text-slate-800">{me.name}</p>
              {isMyTurn && <p className="mt-1 inline-flex rounded-full bg-amber-500 px-2 py-0.5 text-xs font-black text-white">⏰ 你的回合</p>}
            </div>
          </div>

          <div className="mt-4 rounded-2xl bg-gradient-to-r from-rose-50 to-amber-50 p-3">
            <p className="text-xs font-black text-slate-500">儲蓄目標：{me.goal}</p>
            <p className="mt-1 text-2xl font-black text-rose-500">
              ${me.saved} <span className="text-sm font-bold text-slate-400">/ ${me.target}</span>
              {reached && <span className="ml-2 inline-flex rounded-full bg-emerald-500 px-2 py-0.5 align-middle text-xs font-black text-white">🎉 達標</span>}
            </p>
            <div className="mt-2 h-3 overflow-hidden rounded-full bg-rose-100">
              <div className="h-full bg-gradient-to-r from-rose-400 to-pink-500 transition-all" style={{ width: `${goalProgress}%` }}></div>
            </div>
          </div>
          <div className="mt-3 grid grid-cols-2 gap-2">
            <div className="rounded-xl bg-sky-50 p-2 text-center">
              <p className="text-[10px] font-black text-slate-500">手上現金</p>
              <p className="text-xl font-black text-sky-600">${me.cash}</p>
            </div>
            <div className="rounded-xl bg-emerald-50 p-2 text-center">
              <p className="text-[10px] font-black text-slate-500">每日存款</p>
              <p className="text-xl font-black text-emerald-600">${me.daily}</p>
            </div>
          </div>
        </div>

        <div className="rounded-3xl border-[3px] border-white bg-white/85 p-4 shadow-md">
          <h3 className="text-sm font-black text-slate-700">📔 我的反思筆記</h3>
          <textarea value={notesValue} onChange={e => onNotesChange(e.target.value)}
                    placeholder="今天我發現..."
                    className="mt-2 min-h-28 w-full rounded-2xl border-2 border-slate-200 bg-white p-3 text-sm leading-6 outline-none focus:border-amber-400" />
          <p className="mt-1 text-[10px] font-bold text-slate-400">只存在這台 iPad，不會傳給其他人</p>
        </div>
      </>;
    }

    function SpectatorPanel() {
      return <div className="rounded-3xl border-[3px] border-white bg-white/85 p-4 text-center shadow-md">
        <p className="text-4xl">👀</p>
        <p className="mt-2 text-sm font-black text-slate-600">你正在觀看遊戲</p>
        <p className="mt-1 text-xs font-bold text-slate-500">這個房間沒有你的座位，回首頁建立或加入別場。</p>
        <button onClick={() => navigate("/")} className="mt-3 rounded-xl bg-slate-700 px-4 py-2 text-xs font-black text-white">回首頁</button>
      </div>;
    }

    function SharedModal({ modal, g, isMyTurn, currentPlayer, onApplyChoice, onApplyEvent, onFinishFlow, onAnswerQuestion, onContinue }) {
      const interactive = isMyTurn;
      return <div className="modal-backdrop fixed inset-0 z-50 grid place-items-center p-4">
        <div className="flip-in max-h-[92vh] w-full max-w-3xl overflow-auto rounded-[30px] bg-white p-5 shadow-2xl">
          {!isMyTurn && modal.type !== "settle" && (
            <p className="mb-3 flex items-center justify-center gap-2 rounded-2xl bg-amber-100 p-2 text-center text-sm font-black text-amber-800">
              <AnimalAvatar animal={currentPlayer.animal} color={currentPlayer.color} size="sm" />
              ⏳ {currentPlayer.name} 正在做選擇...
            </p>
          )}
          {modal.type === "choice" && (
            <>
              <span className={`inline-flex rounded-full px-4 py-1 text-sm font-black text-white ${modal.kind === "chance" ? "bg-[#a980d8]" : "bg-[#067ca3]"}`}>
                {modal.kind === "chance" ? "機會卡" : "選擇題"}
              </span>
              <h2 className="mt-3 text-3xl font-black">{modal.card.title}</h2>
              {modal.card.image && <img src={modal.card.image} className="task-image" alt="" />}
              <p className="mt-3 text-lg leading-8 text-slate-700">{modal.card.text}</p>
              <div className="mt-5 grid gap-3">
                {modal.card.options.map((op, i) => (
                  <button key={i} disabled={!interactive} onClick={() => onApplyChoice(op)}
                          className="rounded-2xl border-2 border-slate-200 bg-slate-50 p-4 text-left font-black hover:border-amber-400 hover:bg-amber-50 disabled:cursor-not-allowed disabled:opacity-60">
                    {op.label}
                  </button>
                ))}
              </div>
            </>
          )}
          {modal.type === "event" && (
            <>
              <span className="inline-flex rounded-full bg-[#5cb9b0] px-4 py-1 text-sm font-black text-white">命運卡</span>
              <h2 className="mt-3 text-3xl font-black">{modal.card.title}</h2>
              <p className="mt-3 text-lg leading-8 text-slate-700">{modal.card.text}</p>
              <p className="mt-3 rounded-2xl bg-teal-50 p-4 font-bold">{modal.card.note}</p>
              <button disabled={!interactive} onClick={onApplyEvent}
                      className="mt-5 w-full rounded-2xl bg-[#5cb9b0] px-4 py-4 text-xl font-black text-white disabled:opacity-60">
                記錄這件事，揭曉金額
              </button>
            </>
          )}
          {modal.type === "flow" && (
            <>
              <span className="inline-flex rounded-full bg-[#067ca3] px-4 py-1 text-sm font-black text-white">流程排序任務</span>
              <h2 className="mt-3 text-3xl font-black">{flowTasks[modal.taskKey].title}</h2>
              <FlowTask task={flowTasks[modal.taskKey]} onDone={interactive ? onFinishFlow : null} />
              {!interactive && <p className="mt-3 text-center text-sm font-black text-slate-500">只有 {currentPlayer.name} 可以操作</p>}
            </>
          )}
          {modal.type === "question" && (
            <>
              <span className="inline-flex rounded-full bg-[#067ca3] px-4 py-1 text-sm font-black text-white">需要 / 想要 / 評估</span>
              <h2 className="mt-3 text-3xl font-black leading-tight">{modal.question.q}</h2>
              <div className="mt-5 grid grid-cols-3 gap-3">
                {["需要", "想要", "評估"].map(ans => (
                  <button key={ans} disabled={!interactive} onClick={() => onAnswerQuestion(ans)}
                          className="rounded-2xl bg-[#067ca3] px-3 py-5 text-xl font-black text-white disabled:opacity-60">
                    {ans}
                  </button>
                ))}
              </div>
            </>
          )}
          {modal.type === "settle" && (
            <>
              <span className="inline-flex rounded-full bg-amber-500 px-4 py-1 text-sm font-black text-white">一天過去</span>
              <h2 className="mt-3 text-3xl font-black">第 {g.day} 天結算</h2>
              <p className="mt-2 font-bold text-slate-600">每位玩家今天做了什麼？收入支出影響手上現金；一天結束後依每日計畫存入目標帳戶。</p>
              <div className="mt-4 grid gap-3">
                {(modal.snapshot || []).filter(p => p.claimed).map(p => {
                  const dayLog = p.dayLog || [];
                  const income = dayLog.filter(x => x.kind === "收入").reduce((s, x) => s + x.effect, 0);
                  const expense = Math.abs(dayLog.filter(x => x.kind === "支出").reduce((s, x) => s + x.effect, 0));
                  const savedToday = dayLog.filter(x => x.kind === "存款").reduce((s, x) => s + x.effect, 0);
                  const out = p.cash < 0;
                  return <div key={p.id} className={`rounded-2xl border-2 p-3 ${out ? "border-red-200 bg-red-50" : "border-slate-100 bg-slate-50"}`}>
                    <div className="flex flex-wrap items-center justify-between gap-2">
                      <div className="flex items-center gap-2">
                        <AnimalAvatar animal={p.animal} color={p.color} size="sm" />
                        <b className="text-lg">{p.name}</b>
                      </div>
                      <span className={`rounded-full px-3 py-1 text-sm font-black ${out ? "bg-red-600 text-white" : "bg-emerald-100 text-emerald-900"}`}>
                        {out ? "負債，淘汰出局" : `已存 $${p.saved}`}
                      </span>
                    </div>
                    <div className="mt-2 text-sm font-bold text-slate-600">
                      收入 ${income} ｜ 支出 ${expense} ｜ 今日存入 ${savedToday} ｜ 手上現金 ${p.cash} ｜ 目標：{p.goal}
                    </div>
                    <ul className="mt-2 space-y-1 text-sm leading-6">
                      {dayLog.length ? dayLog.map((e, i) =>
                        <li key={i}>• {e.title}：{e.effect >= 0 ? "+" : "-"}${Math.abs(e.effect)}，{e.note}</li>
                      ) : <li>• 今天沒有記錄到事件。</li>}
                    </ul>
                  </div>;
                })}
              </div>
              <button onClick={onContinue} className="mt-5 w-full rounded-2xl bg-[#17324d] px-4 py-4 text-xl font-black text-white">開始下一天</button>
            </>
          )}
          {modal.type === "gameover" && (
            <>
              <span className="inline-flex rounded-full bg-rose-500 px-4 py-1 text-sm font-black text-white">遊戲結束</span>
              <h2 className="mt-3 text-3xl font-black">所有玩家都出局了</h2>
              <p className="mt-2 font-bold text-slate-600">如果想再來一次，請房主按「重置」回到等待室。</p>
            </>
          )}
        </div>
      </div>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
